# Depth Anything V2 Small 392x518 ONNX 转 RDK BPU bin
# 适配 hb_mapper 1.24.3 / horizon_nn 1.1.0
#
# 转换命令：
#   hb_mapper makertbin --config depth_vits_392x518_v124.yaml --model models/depth_anything_v2_small_392x518_sim.onnx --model-type onnx

model_parameters:
  onnx_model: 'models/depth_anything_v2_small_392x518_sim.onnx'
  march: 'bayes-e'
  layer_out_dump: False
  working_dir: './bpu_output_depth_392x518'
  output_model_file_prefix: 'depth_v2_small_392x518'

input_parameters:
  input_name: 'rgb_input'
  input_type_rt: 'rgb'
  input_layout_rt: 'NCHW'
  input_type_train: 'rgb'
  input_layout_train: 'NCHW'

  # BPU 运行时只做 /255；ImageNet mean/std 在 rescue_robot 代码中做
  norm_type: 'data_scale'
  scale_value: 0.003921568627451

  input_shape: '1x3x392x518'

calibration_parameters:
  cal_data_dir: './calibration_data'
  cal_data_type: 'float32'
  preprocess_on: True

compiler_parameters:
  compile_mode: 'latency'
  optimize_level: 'O3'
  debug: False
